name: 'PR Housekeeping'
on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 1 * * *'

permissions:
  contents: write # only for delete-branch option
  issues: write
  pull-requests: write

jobs:
  stale:
    uses: arbor-education/gha.workflows/.github/workflows/pr-housekeeping-template.yaml@v2
    with:
      dry_run: true
